name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14   # Apple Silicon — native aarch64-apple-darwin
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="redact-${VERSION}-aarch64-apple-darwin.tar.gz"
          tar -czf "${ARCHIVE}" -C target/aarch64-apple-darwin/release redact
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "### Homebrew SHA256" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${SHA256}  ${ARCHIVE}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '## SHA256 (for homebrew-redact formula)\n```\n%s  %s\n```\n' \
            "${SHA256}" "${ARCHIVE}" > release_notes.md
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.md \
            "${ARCHIVE}"
