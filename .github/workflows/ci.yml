name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: "$CARGO_HOME/bin/cargo fmt --check"
        if: matrix.os == 'ubuntu-latest'
        shell: bash
      - run: "$CARGO_HOME/bin/cargo clippy --all-targets -- -D warnings"
        shell: bash
      - run: "$CARGO_HOME/bin/cargo test --all"
        shell: bash
      - uses: rustsec/audit-check@v1
        if: matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
