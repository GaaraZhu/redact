# redact config for local dev / demo environment.
# psql-json is a thin wrapper around psql that outputs JSON — it stands in
# for tkpsql/tkdbr in a real deployment.

tools:
  psql-json:
    sql_arg: "--sql"
  psql:
    sql_arg: "-c"
    json_tool: "psql-json"
  mysql:
    sql_arg: "-e"
    json_tool: "mysql-json"
  sqlcmd:
    sql_arg: "-Q"
    json_tool: "sqlcmd-json"

pii:
  action: redact
  wildcard_policy: reject
